<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Checkout</title>
  </head>
  <body>
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>
    <main class="checkout-main">
      <section class="checkout-hero">
        <div class="container">
          <h1 class="checkout-hero__title">Checkout</h1>
          <p class="checkout-hero__subtitle">Fill in your details to complete the purchase</p>
        </div>
      </section>

      <div
        class="checkout-success-modal"
        id="checkoutSuccessModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="checkoutSuccessTitle"
        aria-hidden="true"
      >
        <div class="checkout-success-modal__backdrop"></div>
        <div class="checkout-success-modal__dialog">
          <div class="checkout-success" id="checkoutSuccess">
            <div class="checkout-success__icon" aria-hidden="true">✓</div>
            <p class="checkout-success__text" id="checkoutSuccessTitle">Order placed successfully!</p>
            <a href="./index.html" class="checkout-success__link">Back to home</a>
          </div>
        </div>
      </div>

      <div class="container">
        <div class="checkout-form-wrap">
        <form class="checkout-form" id="checkoutForm" novalidate>
          <div class="checkout-form__field">
            <label class="checkout-form__label" for="fullName"
              >Full name</label
            >
            <input
              type="text"
              id="fullName"
              name="fullName"
              class="checkout-form__input"
              placeholder="Enter your full name"
              autocomplete="name"
            />
            <span
              class="checkout-form__error"
              id="errorFullName"
              aria-live="polite"
            ></span>
          </div>

          <div class="checkout-form__field">
            <label class="checkout-form__label" for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="checkout-form__input"
              placeholder="example@mail.com"
              autocomplete="email"
            />
            <span
              class="checkout-form__error"
              id="errorEmail"
              aria-live="polite"
            ></span>
          </div>

          <div class="checkout-form__field">
            <label class="checkout-form__label" for="phone"
              >Phone number</label
            >
            <input
              type="tel"
              id="phone"
              name="phone"
              class="checkout-form__input"
              placeholder="+7 (777) 777-77-77"
              autocomplete="tel"
            />
            <span
              class="checkout-form__error"
              id="errorPhone"
              aria-live="polite"
            ></span>
          </div>

          <div class="checkout-form__field">
            <label class="checkout-form__label" for="address"
              >Delivery address</label
            >
            <input
              type="text"
              id="address"
              name="address"
              class="checkout-form__input"
              placeholder="City, street, building, apartment"
              autocomplete="street-address"
            />
            <span
              class="checkout-form__error"
              id="errorAddress"
              aria-live="polite"
            ></span>
          </div>

          <div class="checkout-form__field">
            <span class="checkout-form__label">Payment method</span>
            <div class="checkout-form__radio-group">
              <label class="checkout-form__radio-label">
                <input
                  type="radio"
                  name="payment"
                  value="cash"
                  class="checkout-form__radio"
                />
                Cash
              </label>
              <label class="checkout-form__radio-label">
                <input
                  type="radio"
                  name="payment"
                  value="card"
                  class="checkout-form__radio"
                />
                Card
              </label>
            </div>
            <span
              class="checkout-form__error"
              id="errorPayment"
              aria-live="polite"
            ></span>
          </div>

          <button type="submit" class="checkout-form__submit">
            Confirm order
          </button>
        </form>
        </div>
      </div>
    </main>

    <script src="./scripts/cart.js"></script>
    <script src="./scripts/checkout.js"></script>
  </body>
</html>
