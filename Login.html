<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Log in</title>
</head>

<body>
<main class="auth-page">
    <div class="auth-card">
        <a class="auth-brand" href="./Home.html">
            <img src="./img/logo.png" alt="logo" />
        </a>

        <h1 class="auth-title">Log in</h1>
        <p class="auth-subtitle">Welcome back. Please enter your details.</p>

        <form class="auth-form" action="#">
            <label class="auth-label">
                Email
                <input class="auth-input" type="email" placeholder="you@example.com" required />
            </label>

            <label class="auth-label">
                Password
                <input class="auth-input" type="password" placeholder="••••••••" required />
            </label>

            <div class="auth-row">
                <label class="auth-check">
                    <input type="checkbox" />
                    <span>Remember me</span>
                </label>
                <a class="auth-link" href="#">Forgot password?</a>
            </div>

            <button class="auth-btn" type="submit">Log in</button>

            <p class="auth-bottom">
                Don’t have an account?
                <a class="auth-link" href="./Register.html">Sign up</a>
            </p>
        </form>
    </div>
</main>
</body>
</html>
