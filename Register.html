<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Sign up</title>
</head>

<body>
<main class="auth-page">
    <div class="auth-card">
        <a class="auth-brand" href="./Home.html">
            <img src="./img/logo.png" alt="logo" />
        </a>

        <h1 class="auth-title">Sign up</h1>
        <p class="auth-subtitle">Create an account in a minute.</p>

        <form class="auth-form" action="#">
            <div class="auth-grid">
                <label class="auth-label">
                    First name
                    <input class="auth-input" type="text" placeholder="John" required />
                </label>

                <label class="auth-label">
                    Last name
                    <input class="auth-input" type="text" placeholder="Doe" required />
                </label>
            </div>

            <label class="auth-label">
                Email
                <input class="auth-input" type="email" placeholder="you@example.com" required />
            </label>

            <label class="auth-label">
                Password
                <input class="auth-input" type="password" placeholder="Create password" required />
            </label>

            <label class="auth-label">
                Confirm password
                <input class="auth-input" type="password" placeholder="Repeat password" required />
            </label>

            <label class="auth-check auth-check--stack">
                <input type="checkbox" required />
                <span>
              I agree to the <a class="auth-link" href="#">Terms</a> and
              <a class="auth-link" href="#">Privacy Policy</a>.
            </span>
            </label>

            <button class="auth-btn" type="submit">Create account</button>

            <p class="auth-bottom">
                Already have an account?
                <a class="auth-link" href="./Login.html">Log in</a>
            </p>
        </form>
    </div>
</main>
</body>
</html>
